name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: bun run build

      - name: Package artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p packages

          # Linux — tar.gz
          mkdir -p _pkg_linux/zikon
          cp dist/zikon-linux _pkg_linux/zikon/zikon
          cp -r dist/scripts   _pkg_linux/zikon/scripts
          tar -czf "packages/zikon-linux-${VERSION}.tar.gz" -C _pkg_linux zikon

          # macOS — tar.gz
          mkdir -p _pkg_macos/zikon
          cp dist/zikon-macos  _pkg_macos/zikon/zikon
          cp -r dist/scripts   _pkg_macos/zikon/scripts
          tar -czf "packages/zikon-macos-${VERSION}.tar.gz" -C _pkg_macos zikon

          # Windows — zip
          mkdir -p _pkg_windows/zikon
          cp dist/zikon-windows.exe _pkg_windows/zikon/zikon.exe
          cp -r dist/scripts        _pkg_windows/zikon/scripts
          cd _pkg_windows && zip -r "../packages/zikon-windows-${VERSION}.zip" zikon && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/zikon-linux-${{ github.ref_name }}.tar.gz
            packages/zikon-macos-${{ github.ref_name }}.tar.gz
            packages/zikon-windows-${{ github.ref_name }}.zip
